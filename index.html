<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SamaXalis — L'entraide financière étudiante</title>

  <!-- ── CSS ── -->
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/register.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       NAVBAR — fixe, commune à toutes les pages
  ══════════════════════════════════════════ -->
  <nav>
    <button class="nav-logo" onclick="showPage('home')">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="7" fill="#2d6a4f"/>
        <path d="M8 19V13l6-5 6 5v6" stroke="#fff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11 19v-4h6v4" stroke="#d8f3dc" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      SamaXalis
    </button>

    <div class="nav-right">
      <span id="nav-user-name" class="nav-username hidden"></span>
      <button id="nav-login-btn"  class="btn btn-outline" onclick="showPage('login')">Se connecter</button>
      <button id="nav-logout-btn" class="btn btn-ghost hidden" onclick="handleLogout()">Déconnexion</button>
    </div>
  </nav>

  <!-- ══════════════════════════════════════════
       CONTENEUR UNIQUE — les pages s'injectent ici
  ══════════════════════════════════════════ -->
  <div id="app"></div>


  <!-- ══════════════════════════════════════════
       SCRIPTS — ordre important !
  ══════════════════════════════════════════ -->
  <!-- 1. Couche API -->
  <script src="services/service.js"></script>
  <!-- 2. Templates HTML de chaque page -->
  <script src="js/home.js"></script>
  <script src="js/login.js"></script>
  <script src="js/register.js"></script>
  <!-- 3. Router + logique UI (doit être en dernier) -->
  <script src="js/app.js"></script>

</body>
</html>
